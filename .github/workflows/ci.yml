  #       run: pip install pip-audit
  #
  #     - name: Audit futtatása
  #       run: pip-audit -r requirements.txt

  # ============================================================================
  # BLOCK 5 UNLOCK: AI assisted code review
  # ----------------------------------------------------------------------------
  # Az 5. blokkban (AI a folyamatban) aktiváljuk. A Claude Code Action minden
  # PR-en futtat egy AI code review-t. Kell hozzá egy CLAUDE_CODE_OAUTH_TOKEN
  # repository secret. A demóban csak a kommentet vesszük le, éles használathoz
  # a token beállítása szükséges.
